<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0F1C1A" />
<title>Halkhata · Cashflow</title>
<meta name="description" content="Your personal ledger, savings goals, daily budget, loans and zakat, in one place." />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Halkhata" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="topbar-row">
      <div>
        <div class="eyebrow" id="pageEyebrow">Halkhata</div>
        <h1 id="pageTitle">Home</h1>
      </div>
      <button class="iconbtn" id="menuBtn" aria-label="Menu">☰</button>
    </div>
  </header>

  <main id="view" class="view"></main>

  <div id="addOverlay" class="add-overlay">
    <div class="backdrop" id="addBackdrop"></div>
    <div class="add-panel" id="addPanel">
      <button class="sheet-close" id="addCloseBtn" aria-label="Close">✕</button>
      <div class="sheet-handle"></div>
      <div id="addPanelContent"></div>
    </div>
  </div>

  <button id="fab" class="fab hidden" aria-label="Add transaction">+</button>

  <nav class="tabbar" id="tabbar">
    <button class="tabbtn" data-tab="home"><span class="tabicon">⌂</span><span>Home</span></button>
    <button class="tabbtn" data-tab="ledger"><span class="tabicon">▤</span><span>Ledger</span></button>
    <button class="tabbtn" data-tab="goals"><span class="tabicon">◎</span><span>Goals</span></button>
    <button class="tabbtn" data-tab="insights"><span class="tabicon">◐</span><span>Insights</span></button>
  </nav>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
